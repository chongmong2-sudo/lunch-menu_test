    window.onload = function() {
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        
        // 지도 클릭 시 위경도 자동 입력 (신규 등록용)
        naver.maps.Event.addListener(map, 'click', function(e) {
            document.getElementById('add-lat').value = e.coord.lat().toFixed(6);
            document.getElementById('add-lng').value = e.coord.lng().toFixed(6);
        });

        // 본사 마커
        new naver.maps.Marker({
            position: new naver.maps.LatLng(37.476742, 126.889731),
            map: map,
            icon: { content: '<div style="background:#ef4444; color:white; padding:5px 12px; border-radius:20px; font-weight:bold; font-size:12px;">아스크타워</div>', anchor: new naver.maps.Point(40, 15) }
        });

        // DB에서 식당 및 투표 데이터 실시간 감지
        db.ref('restaurants').on('value', snap => {
            const dbData = snap.val() || {};
            const dbRests = Object.keys(dbData).map(key => ({ id: key, ...dbData[key] }));
            allRests = [...fixedRests, ...dbRests];
            updateMapAndSelects();
        });

        db.ref('lunch_vote').on('value', snap => {
            const data = snap.val() || {};
            updateVoteUI(data);
        });
    };

    function updateMapAndSelects() {
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        sels.forEach(s => {
            const prev = s.value;
            s.innerHTML = '<option value="">메뉴 선택</option>';
            allRests.forEach(r => s.add(new Option(`[${r.cat}] ${r.name}`, r.name)));
            s.value = prev;
        });

        markers.forEach(m => m.setMap(null));
        markers = [];
        allRests.forEach(r => {
            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(r.lat, r.lng),
                map: map,
                icon: { content: `<div class="custom-marker">${r.name}</div>`, anchor: new naver.maps.Point(40, 15) }
            });
            naver.maps.Event.addListener(marker, 'click', () => {
                selectedRest = r;
                document.getElementById('bottom-info-panel').style.display = 'block';
                document.getElementById('res-name').innerText = r.name;
                document.getElementById('res-sub').innerText = `${r.cat} · ⭐${r.rate} · ${r.dist}`;
                document.getElementById('res-menu').innerText = r.menu;
                document.getElementById('res-tel').innerText = r.tel;
                document.getElementById('link-map').href = `https://map.naver.com/v5/search/${encodeURIComponent(r.name)}`;
            });
            markers.push(marker);
        });
    }

    function updateVoteUI(data) {
        document.getElementById('menu1').value = data.menu1 || "";
        document.getElementById('menu2').value = data.menu2 || "";
        document.getElementById('menu3').value = data.menu3 || "";
        document.getElementById('th-m1').innerText = data.menu1 || "1";
        document.getElementById('th-m2').innerText = data.menu2 || "2";
        document.getElementById('th-m3').innerText = data.menu3 || "3";
        
        const tbody = document.getElementById('list');
        tbody.innerHTML = '';
        let count = 0;
        emps.forEach((name, i) => {
            const v = data['vote_'+i] || 0;
            if(v > 0) count++;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${name}</td>` + 
                [1,2,3].map(n => `<td><input type="radio" name="v${i}" ${v==n?'checked':''} onclick="vote(${i},${n})"></td>`).join('');
            tbody.appendChild(tr);
        });
        document.getElementById('voted-count').innerText = count;
    }

    // [요청] 메뉴 팝업 열기
    function openMenuModal() {
        if (!selectedRest || !selectedRest.img) {
            alert("이미지가 등록되지 않은 식당입니다.");
            return;
        }
        document.getElementById('modal-img').src = selectedRest.img;
        document.getElementById('img-modal').style.display = 'flex';
    }

    // 파이어베이스 통신 함수
    function sync() { db.ref('lunch_vote').update({ menu1: document.getElementById('menu1').value, menu2: document.getElementById('menu2').value, menu3: document.getElementById('menu3').value }); }
    function vote(i, v) { db.ref('lunch_vote').once('value').then(snap => { const cur = snap.val() ? snap.val()['vote_'+i] : 0; db.ref('lunch_vote').update({ ['vote_'+i]: cur == v ? 0 : v }); }); }
    function resetData() { if(confirm("초기화할까요?")) db.ref('lunch_vote').set(null); }
    
    function addNewRest() {
        const name = document.getElementById('add-name').value;
        const lat = document.getElementById('add-lat').value;
        if(!name || !lat) { alert("이름과 위치(지도클릭)를 확인해주세요."); return; }
        db.ref('restaurants').push({
            name: name, cat: document.getElementById('add-cat').value,
            menu: document.getElementById('add-menu').value,
            img: document.getElementById('add-img').value,
            lat: parseFloat(lat), lng: parseFloat(document.getElementById('add-lng').value),
            dist: "?m", rate: "-", tel: "-"
        });
        alert("등록되었습니다!");
        document.getElementById('add-name').value = "";
    }
</script>
