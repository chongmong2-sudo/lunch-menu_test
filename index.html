    <style>

        :root { --primary: #3b82f6; --accent: #f59e0b; --danger: #ef4444; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text-main); }
        
        /* 레이아웃 */
        .left-panel { width: 420px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.03); }
        .header { padding: 24px 20px; background: #ffffff; color: var(--primary); display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 22px; border-bottom: 1px solid var(--border); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        .section { margin-bottom: 24px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { background: #f1f5f9; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--text-sub); cursor: pointer; }
        
        /* 투표 테이블 */
        .voting-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        .voting-table th { padding: 12px 4px; background: #f8fafc; font-weight: 600; color: var(--text-sub); border-bottom: 2px solid var(--border); }
        .voting-table td { padding: 10px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .menu-label { color: var(--accent); display: block; font-size: 11px; font-weight: 600; margin-top: 4px; }
        .count-badge { color: var(--primary); font-size: 11px; font-weight: 700; background: #eff6ff; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
        
        /* 식당 정보 패널 */
        #bottom-info-panel { padding: 24px; background: #fff; border-top: 1px solid var(--border); min-height: 280px; display: none; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
        .info-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .info-row { font-size: 13px; margin-bottom: 8px; color: var(--text-sub); display: flex; }
        .info-label { font-weight: 600; color: #94a3b8; width: 80px; flex-shrink: 0; }
        .info-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-link { flex: 1; padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: 700; font-size: 14px; border:none; cursor: pointer; }
        
        /* 지도 및 관리자 */
        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .custom-marker { background: white; border: 1px solid var(--primary); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); white-space: nowrap; }
        #admin-panel { position: absolute; bottom: 80px; right: 20px; width: 320px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; overflow: hidden; display: none; border: 1px solid var(--primary); }
        .admin-header { background: var(--primary); color: white; padding: 12px 15px; font-weight: 700; display: flex; justify-content: space-between; }
        .admin-body { padding: 15px; max-height: 400px; overflow-y: auto; }
        .admin-input { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
        #admin-toggle { position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 25px; border: none; font-size: 24px; cursor: pointer; z-index: 1999; }

        #img-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; justify-content: center;

        }

            box-shadow: 0 0 30px rgba(0,0,0,0.5);

</head>

                        <th><span id="label-m3">-</span><span id="count-m3" class="count-badge">0</span></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
    <div id="bottom-info-panel">
        <div class="info-title" id="res-name">-</div>
        <div id="res-cat" style="color:var(--primary); font-weight:600; margin-bottom:10px;">-</div>

        <div class="info-row"><span class="info-label">전화번호</span> <span id="res-tel">-</span></div>
        <div class="info-btns">

            <button onclick="openMenuModal()" class="btn-link" style="background: var(--accent);">메뉴판 보기</button>
            <button onclick="deleteRest()" id="btn-delete-rest" class="btn-link" style="background: var(--danger); display:none;">삭제</button>
        </div>
    </div>
</div>

<div class="right-panel">
    <div id="map"></div>
    <button id="admin-toggle" onclick="toggleAdmin()">⚙️</button>
    <div id="admin-panel">

    let allRests = [];
    let markers = [];
    let selectedRestData = null;

    window.onload = function() {
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        
        // 클릭 시 위도 경도 폼 자동입력
        naver.maps.Event.addListener(map, 'click', e => {
            document.getElementById('add-lat').value = e.coord.lat().toFixed(6);
            document.getElementById('add-lng').value = e.coord.lng().toFixed(6);
        });

        // 본사 마커
        new naver.maps.Marker({
            position: new naver.maps.LatLng(37.476742, 126.889731),
            map: map,
            icon: { content: '<div style="background:var(--danger); color:white; padding:6px 14px; border-radius:30px; font-weight:700;">아스크타워</div>', anchor: new naver.maps.Point(40, 15) }
        });

        // DB 식당 데이터 불러오기
        db.ref('restaurants').on('value', snap => {
            const dbData = snap.val() || {};
            const dbRests = Object.keys(dbData).map(key => ({ id: key, ...dbData[key], isFixed: false }));
            allRests = [...fixedRests, ...dbRests];
            updateRestUI();
        });

        // 투표 데이터 불러오기
        db.ref('lunch_vote').on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('menu1').value = data.menu1 || "";
            document.getElementById('menu2').value = data.menu2 || "";
            document.getElementById('menu3').value = data.menu3 || "";
            document.getElementById('label-m1').innerText = data.menu1 || "-";
            document.getElementById('label-m2').innerText = data.menu2 || "-";
            document.getElementById('label-m3').innerText = data.menu3 || "-";
            
            const tbody = document.getElementById('list'); 
            tbody.innerHTML = '';
            let totalVoted = 0;
            const menuCounts = { 1: 0, 2: 0, 3: 0 };
            
            emps.forEach((name, i) => {
                const v = data['vote_'+i] || 0;
                if(v > 0) { totalVoted++; menuCounts[v]++; }
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${name}</td>` + [1,2,3].map(n => `<td><input type="radio" name="v${i}" ${v==n?'checked':''} onclick="vote(${i},${n})"></td>`).join('');
                tbody.appendChild(tr);
            });
            document.getElementById('total-participants').innerText = totalVoted;
            document.getElementById('count-m1').innerText = menuCounts[1];
            document.getElementById('count-m2').innerText = menuCounts[2];
            document.getElementById('count-m3').innerText = menuCounts[3];
        });
    };

    function updateRestUI() {
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        sels.forEach(s => {
            const currentVal = s.value;
            s.innerHTML = '<option value="">메뉴 선택</option>';
            allRests.forEach((r, idx) => s.add(new Option(`${idx+1}. [${r.cat}] ${r.name}`, r.name)));
            s.value = currentVal;
        });

        markers.forEach(m => m.setMap(null));
        markers = [];
        allRests.forEach((r, idx) => {
            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(r.lat, r.lng),
                map: map,
                icon: { content: `<div class="custom-marker">${idx+1}. ${r.name}</div>`, anchor: new naver.maps.Point(40, 15) }
            });
            naver.maps.Event.addListener(marker, 'click', () => showDetail(r));
            markers.push(marker);
        });
    }

    function showDetail(r) {
        selectedRestData = r;
        document.getElementById('bottom-info-panel').style.display = 'block';
        document.getElementById('res-name').innerText = r.name;
        document.getElementById('res-cat').innerText = r.cat;
        document.getElementById('res-dist').innerText = r.dist;
        document.getElementById('res-menu').innerText = r.menu;
        document.getElementById('res-rate').innerText = '⭐' + r.rate;
        document.getElementById('res-tel').innerText = r.tel;
        document.getElementById('link-map').href = `https://map.naver.com/v5/search/${encodeURIComponent(r.name)}`;
        document.getElementById('btn-delete-rest').style.display = r.isFixed ? 'none' : 'block';
    }

    // 모달 제어 함수
    function openMenuModal() {
        if (!selectedRestData || !selectedRestData.img) {
            alert("등록된 메뉴 이미지가 없습니다.");
            return;
        }
        document.getElementById('modal-img').src = selectedRestData.img;
        document.getElementById('img-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('img-modal').style.display = 'none';
    }

    // 데이터 관리 함수들
    function sync() { db.ref('lunch_vote').update({ menu1: document.getElementById('menu1').value, menu2: document.getElementById('menu2').value, menu3: document.getElementById('menu3').value }); }
    function vote(i, v) { db.ref('lunch_vote').once('value').then(snap => { const cur = snap.val() ? snap.val()['vote_'+i] : 0; db.ref('lunch_vote').update({ ['vote_'+i]: cur == v ? 0 : v }); }); }
    function resetData() { if(confirm("초기화할까요?")) db.ref('lunch_vote').set(null); }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    
    function addNewRest() {
        const name = document.getElementById('add-name').value;
        if(!name) return;
        const newRest = {
            name: name, cat: document.getElementById('add-cat').value,
            img: document.getElementById('add-img').value,
            lat: parseFloat(document.getElementById('add-lat').value),
            lng: parseFloat(document.getElementById('add-lng').value),
            dist: "-", rate: "-", tel: "-", menu: "-"
        };
        db.ref('restaurants').push(newRest);
        alert("등록완료!");
    }
</script>
</body>
</html>
