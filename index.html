<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 모먹지? - 아스크타워</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* 기존 스타일 유지 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        :root { 
            --primary: #3b82f6; --accent: #f59e0b; --danger: #ef4444; 
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b;
            --text-sub: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text-main); }
        .left-panel { width: 420px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.03); }
        .header { padding: 24px 20px; background: #ffffff; color: var(--primary); display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 22px; border-bottom: 1px solid var(--border); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        .section { margin-bottom: 24px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); }
        .reset-btn { background: #f1f5f9; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--text-sub); cursor: pointer; }
        .voting-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        .voting-table th { padding: 12px 4px; background: #f8fafc; font-weight: 600; color: var(--text-sub); border-bottom: 2px solid var(--border); }
        .voting-table td { padding: 10px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .menu-label { color: var(--accent); display: block; font-size: 11px; font-weight: 600; margin-top: 4px; }
        .count-badge { color: var(--primary); font-size: 11px; font-weight: 700; background: #eff6ff; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
        #bottom-info-panel { padding: 24px; background: #fff; border-top: 1px solid var(--border); min-height: 280px; display: none; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
        .info-title { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .info-row { font-size: 13px; margin-bottom: 8px; color: var(--text-sub); display: flex; align-items: center; }
        .info-label { font-weight: 600; color: #94a3b8; width: 80px; flex-shrink: 0; }
        .info-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-link { flex: 1; padding: 14px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-weight: 700; font-size: 14px; }
        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .custom-marker { background: white; border: 1px solid var(--primary); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); white-space: nowrap; }

        /* [수정됨] 신규 음식점 추가 버튼 스타일 */
        .add-res-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: none;
        }
        .add-res-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5);
            background: #2563eb;
        }
        .add-res-btn svg { width: 18px; height: 18px; }

        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 13px; background: #fdfdfd; outline: none; }
        input[type="radio"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="header">🍱 오늘 모먹지?</div>
    <div class="scroll-area">
        <div class="section">
            <div class="section-title">1. 선착순 메뉴 선점 <button class="reset-btn" onclick="resetData()">↻ 초기화</button></div>
            <select id="menu1" onchange="sync()"><option value="">메뉴 1 선택</option></select>
            <select id="menu2" onchange="sync()"><option value="">메뉴 2 선택</option></select>
            <select id="menu3" onchange="sync()"><option value="">메뉴 3 선택</option></select>
        </div>
        <div class="section">
            <div class="section-title">2. 실시간 투표 현황 <span style="font-size:12px; font-weight:400; color:var(--text-sub);"><span id="total-participants" style="font-weight:700; color:var(--primary);">0</span>명 참여</span></div>
            <table class="voting-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>메뉴 1<span id="count-m1" class="count-badge">0</span><span id="label-m1" class="menu-label">-</span></th>
                        <th>메뉴 2<span id="count-m2" class="count-badge">0</span><span id="label-m2" class="menu-label">-</span></th>
                        <th>메뉴 3<span id="count-m3" class="count-badge">0</span><span id="label-m3" class="menu-label">-</span></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
    <div id="bottom-info-panel">
        <div class="info-header">
            <div class="info-title" id="res-name">-</div>
            <div style="font-size:13px; color:var(--primary); font-weight:600;" id="res-cat">-</div>
        </div>
        <div class="info-row"><span class="info-label">거리/평점</span> <span id="res-dist">-</span> · <span id="res-rate">-</span></div>
        <div class="info-row"><span class="info-label">대표메뉴</span> <span id="res-menu" style="color:var(--text-main); font-weight:600;">-</span></div>
        <div class="info-row"><span class="info-label">전화번호</span> <span id="res-tel">-</span></div>
        <div class="info-row"><span class="info-label">상세주소</span> <span id="res-addr">-</span></div>
        <div class="info-btns">
            <a href="#" id="link-map" target="_blank" class="btn-link" style="background: #03C75A;">네이버 지도</a>
            <a href="#" id="link-menu" target="_blank" class="btn-link" style="background: var(--accent);">메뉴판 보기</a>
        </div>
    </div>
</div>

<div class="right-panel">
    <div id="map"></div>
    
    <button class="add-res-btn" onclick="addNewRestaurant()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
        신규 음식점 추가
    </button>
</div>

<script>
    // 기존 Firebase 설정 및 데이터 유지
    const firebaseConfig = { apiKey: "AIzaSyAcyRvDUV67IJi3o8Z1Dl2tDHBATCN_d4Q", authDomain: "lunch-menu-3c36c.firebaseapp.com", databaseURL: "https://lunch-menu-3c36c-default-rtdb.firebaseio.com", projectId: "lunch-menu-3c36c", storageBucket: "lunch-menu-3c36c.appspot.com", messagingSenderId: "498939490952", appId: "1:498939490952:web:9849dd97c3089a153a253d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const emps = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];
    const rests = [ /* ... 60개 식당 데이터 생략 (실제 코드에는 포함) ... */ ];

    let map;

    window.onload = function() {
        // 기존 초기화 로직 유지
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        rests.forEach(r => sels.forEach(s => s.add(new Option(`[${r.cat}] ${r.name}`, r.name))));
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        // ... (마커 생성 로직 생략) ...
    };

    // [수정됨] 신규 음식점 추가 함수
    function addNewRestaurant() {
        const name = prompt("추가하실 음식점 이름을 입력해주세요.");
        if(name) {
            alert(`'${name}' 식당 정보를 입력하는 창을 띄웁니다. (기능 구현 예정)`);
            // 여기에 실제 데이터베이스 저장 로직을 연결할 수 있습니다.
        }
    }

    // 기타 sync, vote, resetData 함수 유지
    function sync() { db.ref('lunch_vote').update({ menu1: document.getElementById('menu1').value, menu2: document.getElementById('menu2').value, menu3: document.getElementById('menu3').value }); }
    function vote(i, v) { db.ref('lunch_vote').once('value').then(snap => { const current = snap.val() ? snap.val()['vote_'+i] : 0; if (current === v) { db.ref('lunch_vote').update({ ['vote_'+i]: 0 }); } else { db.ref('lunch_vote').update({ ['vote_'+i]: v }); } }); }
    function resetData() { if(confirm("모든 데이터를 초기화할까요?")) db.ref('lunch_vote').set(null); }
</script>
</body>
</html>
