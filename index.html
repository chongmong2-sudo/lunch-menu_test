<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 모먹지? - 상단 미리보기 & 식당 추가</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        :root { 
            --primary: #3b82f6; --accent: #f59e0b; --danger: #ef4444; 
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b;
            --text-sub: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: var(--text-main); }
        
        /* 상단 미리보기 바 */
        .top-preview-bar { height: 120px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; overflow-x: auto; z-index: 1000; }
        .preview-card { flex-shrink: 0; width: 160px; height: 90px; border-radius: 8px; overflow: hidden; position: relative; border: 2px solid var(--border); cursor: pointer; }
        .preview-card img { width: 100%; height: 100%; object-fit: cover; }
        .preview-card .label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; font-size: 11px; padding: 2px 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .preview-title { font-size: 14px; font-weight: 700; color: var(--primary); width: 80px; text-align: center; }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* 왼쪽 패널 */
        .left-panel { width: 380px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        
        .section { margin-bottom: 20px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; }

        /* 하단 상세 정보 (이미지 제거 버전) */
        #bottom-info-panel { padding: 20px; background: #fff; border-top: 2px solid var(--primary); display: none; }
        .info-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .info-row { font-size: 13px; margin-bottom: 5px; color: var(--text-sub); }
        .info-btns { display: flex; gap: 8px; margin-top: 12px; }

        /* 식당 추가 폼 */
        .add-form input, .add-form select { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
        .btn-add { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }

        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        .btn-link { flex: 1; padding: 10px; border-radius: 6px; text-align: center; text-decoration: none; color: white; font-weight: 700; font-size: 12px; border:none; cursor: pointer; }
        
        #image-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #modal-content { max-width: 90%; max-height: 90%; }

        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="top-preview-bar" id="top-preview">
    <div class="preview-title">선정 메뉴<br>미리보기</div>
    <div class="preview-card" id="prev-1" onclick="focusRestById(1)"><img src="" id="img-1"><div class="label" id="txt-1">메뉴 1</div></div>
    <div class="preview-card" id="prev-2" onclick="focusRestById(2)"><img src="" id="img-2"><div class="label" id="txt-2">메뉴 2</div></div>
    <div class="preview-card" id="prev-3" onclick="focusRestById(3)"><img src="" id="img-3"><div class="label" id="txt-3">메뉴 3</div></div>
</div>

<div class="main-container">
    <div class="left-panel">
        <div class="scroll-area">
            <div class="section">
                <div class="section-title">1. 메뉴 선정 <button style="font-size:10px; cursor:pointer;" onclick="resetData()">초기화</button></div>
                <select id="menu1" onchange="sync()" style="width:100%; padding:8px; margin-bottom:5px;"></select>
                <select id="menu2" onchange="sync()" style="width:100%; padding:8px; margin-bottom:5px;"></select>
                <select id="menu3" onchange="sync()" style="width:100%; padding:8px;"></select>
            </div>

            <div class="section">
                <div class="section-title">2. 실시간 투표</div>
                <table>
                    <thead><tr><th>이름</th><th id="l-m1">-</th><th id="l-m2">-</th><th id="l-m3">-</th></tr></thead>
                    <tbody id="list"></tbody>
                </table>
            </div>

            <div class="section add-form">
                <div class="section-title">3. 신규 음식점 추가</div>
                <input type="text" id="add-name" placeholder="음식점 명">
                <input type="text" id="add-cat" placeholder="카테고리 (예: 중식)">
                <input type="text" id="add-menu" placeholder="대표 메뉴">
                <input type="text" id="add-img" placeholder="메뉴판 이미지 URL">
                <div style="display:flex; gap:5px;">
                    <input type="number" id="add-lat" step="0.000001" placeholder="위도(Lat)">
                    <input type="number" id="add-lng" step="0.000001" placeholder="경도(Lng)">
                </div>
                <button class="btn-add" onclick="addNewRest()">목록에 추가하기</button>
            </div>
        </div>

        <div id="bottom-info-panel">
            <div class="info-title" id="res-name">-</div>
            <div class="info-row"><b>분류:</b> <span id="res-cat">-</span> | <b>평점:</b> ⭐<span id="res-rate">-</span></div>
            <div class="info-row"><b>메뉴:</b> <span id="res-menu">-</span></div>
            <div class="info-btns">
                <a href="#" id="link-map" target="_blank" class="btn-link" style="background: #03C75A;">네이버 지도</a>
                <button onclick="openMenuImage()" class="btn-link" style="background: var(--accent);">메뉴판 크게보기</button>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="map"></div>
    </div>
</div>

<div id="image-modal" onclick="this.style.display='none'"><img id="modal-content"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAcyRvDUV67IJi3o8Z1Dl2tDHBATCN_d4Q", authDomain: "lunch-menu-3c36c.firebaseapp.com", databaseURL: "https://lunch-menu-3c36c-default-rtdb.firebaseio.com", projectId: "lunch-menu-3c36c", storageBucket: "lunch-menu-3c36c.appspot.com", messagingSenderId: "498939490952", appId: "1:498939490952:web:9849dd97c3089a153a253d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const emps = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];
    let allRests = [
        {"name":"얌얌한식뷔페","lat":37.476515,"lng":126.889612,"cat":"뷔페","menu":"한식뷔페","rate":"83.75","menuImg":"https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20250905_131%2F1757062251583OmjAH_JPEG%2F%25BE%25E4%25BE%25E4_%25B7%25CE%25B0%25ED.JPG"},
        {"name":"무스탕키친","lat":37.476927,"lng":126.889926,"cat":"인도네팔","menu":"커리","rate":"82","menuImg":"https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20251217_159%2F1765968714422F1MI6_JPEG%2FKakaoTalk_20251217_195125675.jpg"},
        {"name":"도쎄멕시칸","lat":37.476421,"lng":126.889774,"cat":"남미음식","menu":"타코,브리또","rate":"85","menuImg":"https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20250521_8%2F17477955350945xa03_JPEG%2F1000005214.jpg"},
        {"name":"가온담","lat":37.476753,"lng":126.890088,"cat":"국,탕,찌개","menu":"감자탕","rate":"86.5","menuImg":"https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20260103_289%2F1767423708944XPXdl_JPEG%2Fimage.jpg"},
        {"name":"용","lat":37.477109,"lng":126.890506,"cat":"중식","menu":"짜장,짬뽕","rate":"89","menuImg":"https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20240305_168%2F1709623303018qH4qJ_JPEG%2F1709623280118568059656964254783.jpg"}
    ];

    let map;
    let markers = [];
    let selectedRestData = null;

    window.onload = function() {
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        initUI();
        
        db.ref('lunch_vote').on('value', snap => {
            const data = snap.val() || {};
            updateVotingTable(data);
            updateTopPreview(data);
        });
    };

    function initUI() {
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        sels.forEach(s => {
            s.innerHTML = '<option value="">식당 선택</option>';
            allRests.forEach(r => s.add(new Option(`[${r.cat}] ${r.name}`, r.name)));
        });

        markers.forEach(m => m.setMap(null));
        markers = allRests.map((r, i) => {
            const m = new naver.maps.Marker({
                position: new naver.maps.LatLng(r.lat, r.lng),
                map: map,
                title: r.name
            });
            naver.maps.Event.addListener(m, 'click', () => showDetail(r));
            return m;
        });
    }

    function updateTopPreview(data) {
        [1, 2, 3].forEach(num => {
            const name = data['menu' + num];
            const rest = allRests.find(r => r.name === name);
            const img = document.getElementById('img-' + num);
            const txt = document.getElementById('txt-' + num);
            if (rest) {
                img.src = rest.menuImg;
                txt.innerText = rest.name;
                document.getElementById('prev-' + num).style.opacity = "1";
            } else {
                img.src = "https://via.placeholder.com/160x90?text=None";
                txt.innerText = "미선택";
                document.getElementById('prev-' + num).style.opacity = "0.4";
            }
        });
    }

    function updateVotingTable(data) {
        document.getElementById('menu1').value = data.menu1 || "";
        document.getElementById('menu2').value = data.menu2 || "";
        document.getElementById('menu3').value = data.menu3 || "";
        document.getElementById('l-m1').innerText = data.menu1 || "-";
        document.getElementById('l-m2').innerText = data.menu2 || "-";
        document.getElementById('l-m3').innerText = data.menu3 || "-";

        const tbody = document.getElementById('list');
        tbody.innerHTML = '';
        emps.forEach((name, i) => {
            const v = data['vote_'+i] || 0;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${name}</td>` + [1,2,3].map(n => `<td><input type="radio" name="v${i}" ${v==n?'checked':''} onclick="vote(${i},${n})"></td>`).join('');
            tbody.appendChild(tr);
        });
    }

    function addNewRest() {
        const name = document.getElementById('add-name').value;
        const lat = parseFloat(document.getElementById('add-lat').value);
        const lng = parseFloat(document.getElementById('add-lng').value);
        if(!name || !lat) return alert("이름과 좌표는 필수입니다.");

        allRests.push({
            name: name,
            cat: document.getElementById('add-cat').value || "미분류",
            menu: document.getElementById('add-menu').value || "정보없음",
            menuImg: document.getElementById('add-img').value || "https://via.placeholder.com/400",
            lat: lat, lng: lng, rate: "-"
        });
        
        alert("추가되었습니다!");
        initUI();
    }

    function showDetail(r) {
        selectedRestData = r;
        document.getElementById('bottom-info-panel').style.display = 'block';
        document.getElementById('res-name').innerText = r.name;
        document.getElementById('res-cat').innerText = r.cat;
        document.getElementById('res-menu').innerText = r.menu;
        document.getElementById('res-rate').innerText = r.rate;
        document.getElementById('link-map').href = `https://map.naver.com/v5/search/${encodeURIComponent(r.name)}`;
        map.panTo(new naver.maps.LatLng(r.lat, r.lng));
    }

    function focusRestById(num) {
        const name = document.getElementById('menu' + num).value;
        const r = allRests.find(i => i.name === name);
        if(r) showDetail(r);
    }

    function openMenuImage() {
        if (!selectedRestData) return;
        document.getElementById('modal-content').src = selectedRestData.menuImg;
        document.getElementById('image-modal').style.display = 'flex';
    }

    function sync() { 
        db.ref('lunch_vote').update({ 
            menu1: document.getElementById('menu1').value, 
            menu2: document.getElementById('menu2').value, 
            menu3: document.getElementById('menu3').value 
        }); 
    }

    function vote(i, v) {
        db.ref('lunch_vote').once('value').then(snap => {
            const cur = snap.val() ? snap.val()['vote_'+i] : 0;
            db.ref('lunch_vote').update({ ['vote_'+i]: cur == v ? 0 : v });
        });
    }

    function resetData() { if(confirm("초기화?")) db.ref('lunch_vote').set(null); }
</script>
</body>
</html>
